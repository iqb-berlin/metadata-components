
<mat-chip-grid #chipGrid
  [disabled]="props.readonly ?? false"
  (click)="!(props.readonly ?? false) && showNodeTree()">
  @for (item of formControl.value; track item; let i = $index) {
    <mat-chip-row [editable]="false">
      <div class="clip-text">
        {{item.name}}
      </div>
      @if (!(props.readonly ?? false)) {
        <button matChipRemove (click)="remove(i)">
          <mat-icon>cancel</mat-icon>
        </button>
      }
    </mat-chip-row>
  }
  <input [formControl]="itemControl"
    [disabled]="props.readonly ?? false"
    (keydown)="$event.preventDefault()"
    [matChipInputFor]="chipGrid"
    [matChipInputAddOnBlur]="false"
    (blur)="onBlur()">
</mat-chip-grid>
