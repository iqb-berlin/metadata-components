<div class="duration-container">
  <div class="duration-input-group">
    <mat-form-field class="time-input">
      @if (props.label) {
        <mat-label>  </mat-label>
      }
      <input
        type="number"
        matInput
        [disabled]="props.readonly ?? false"
        [min]="minMinutes"
        [attr.max]="maxMinutes > 0 ? maxMinutes : null"
        [(ngModel)]="duration.minutes"
        (ngModelChange)="durationChange()"/>
    </mat-form-field>
    <div class="duration-separator">:</div>
    <mat-form-field class="time-input">
      @if (props.label) {
        <mat-label>  </mat-label>
      }
      <input
        type="number"
        matInput
        [disabled]="props.readonly ?? false"
        [min]="minSeconds"
        [attr.max]="maxSeconds > 0 ? maxSeconds : null"
        [(ngModel)]="duration.seconds"
        (ngModelChange)="durationChange()"/>
    </mat-form-field>
  </div>
  <!-- @if (props.label) {
    <div
      class="label">
      {{props.label}}
    </div>
  } -->
</div>
