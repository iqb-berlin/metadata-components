name: CI

on:
  push:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  quality:
    name: Build, test, and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build_mc

      - name: Test library
        run: npm run test:ci

      - name: Lint
        run: npm run lint
